services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: psl-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Hjvfy3105
      POSTGRES_DB: psl_db
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d psl_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: src/API/Dockerfile
      target: final
    container_name: psl-api
    ports:
      - "8080:8080"
    environment:
      # Переопределяем строку подключения — в контейнере хост это имя сервиса postgres
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=psl_db;
        Username=postgres;Password=Hjvfy3105
      Jwt__Key: "07a84af24df84b42939ab2fdc643325f"
      Jwt__Issuer: "PSL"
      Jwt__Audience: "PSL"
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
